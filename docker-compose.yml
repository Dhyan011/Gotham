version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: gotham_db
    environment:
      POSTGRES_USER: gotham
      POSTGRES_PASSWORD: gotham_password
      POSTGRES_DB: gotham_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  gremlin-server:
    image: tinkerpop/gremlin-server:3.7.1
    container_name: gotham_gremlin
    ports:
      - "8182:8182"
    restart: unless-stopped

volumes:
  postgres_data:
