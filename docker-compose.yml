version: '3.8'

services:
  # PostgreSQL with pgvector extension for semantic search
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: gotham_postgres
    environment:
      POSTGRES_USER: gotham
      POSTGRES_PASSWORD: gotham_password
      POSTGRES_DB: gotham_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Neo4j Graph Database with Graph Data Science (GDS) plugin
  neo4j:
    image: neo4j:5.16.0
    container_name: gotham_neo4j
    environment:
      NEO4J_AUTH: neo4j/gotham_graph_pass
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
